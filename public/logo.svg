<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="logoShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" filter="url(#logoShadow)" />
  
  <!-- Inner accent circle -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" />
  
  <!-- Letter A -->
  <g transform="translate(60, 85)">
    <!-- Left stroke of A -->
    <path d="M 12 35 L 0 0" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Right stroke of A -->
    <path d="M 12 35 L 24 0" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Horizontal bar of A -->
    <line x1="2" y1="18" x2="22" y2="18" stroke="white" stroke-width="7" stroke-linecap="round" />
  </g>
  
  <!-- Letter S -->
  <g transform="translate(110, 85)">
    <!-- Top curve -->
    <path d="M 20 3 Q 20 3 10 3 Q 2 3 2 9 Q 2 13 8 15 Q 18 18 18 24 Q 18 28 10 31 Q 0 31 0 31" 
          stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
  
  <!-- Decorative dots -->
  <circle cx="170" cy="70" r="3.5" fill="rgba(255,255,255,0.4)" />
  <circle cx="30" cy="130" r="3.5" fill="rgba(255,255,255,0.4)" />
</svg>
